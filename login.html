<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Tabifi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --surface2: #161616;
      --border: #2a2a2a; --border2: #1e1e1e;
      --text: #ffffff; --muted: #888888; --muted2: #555555;
      --accent: #7c6cff; --accent2: #5b4fd4; --green: #22c55e;
      --radius: 14px; --radius-sm: 8px;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden; line-height: 1.6;
      display: flex; flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(130px); pointer-events: none; z-index: 0; opacity: 0.14; }
    .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: 50%; transform: translateX(-50%); }
    .orb-2 { width: 300px; height: 300px; background: #4f8bff; bottom: 0; right: 0; }

    /* Header */
    #site-header { position: relative; z-index: 100; padding: 20px 0; border-bottom: 1px solid var(--border2); }
    .header-inner { display: flex; align-items: center; justify-content: space-between; max-width: 1120px; margin: 0 auto; padding: 0 24px; }
    .logo { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg,#fff 0%,#aaa 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .nav-link { padding: 8px 16px; font-size: 0.875rem; font-weight: 500; color: var(--muted); background: transparent; border: none; border-radius: var(--radius-sm); transition: color 0.15s, background 0.15s; text-decoration: none; display: inline-block; }
    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); }

    /* Main */
    .login-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 24px; position: relative; z-index: 1; }
    .login-box { width: 100%; max-width: 420px; }

    /* Card */
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px; position: relative; overflow: hidden; }
    .login-card::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; height: 1px; background: linear-gradient(90deg,transparent,var(--accent),transparent); }

    .login-logo { font-size: 1rem; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg,#fff 0%,#aaa 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 20px; }
    .login-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; text-align: center; }
    .login-sub { font-size: 0.875rem; color: var(--muted); margin-bottom: 28px; text-align: center; }

    /* Google button wrapper */
    .google-btn-wrap { display: flex; justify-content: center; margin-bottom: 20px; }

    /* Divider */
    .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 0.75rem; color: var(--muted2); white-space: nowrap; }

    /* Tab toggle for Login / Sign Up */
    .tab-toggle { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px; gap: 4px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 8px 0; border: none; border-radius: 6px; font-size: 0.875rem; font-weight: 500; cursor: pointer; background: transparent; color: var(--muted); transition: background 0.15s, color 0.15s; }
    .tab-btn.active { background: var(--surface); color: var(--text); font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }

    /* Form */
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 7px; letter-spacing: 0.3px; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; padding: 11px 14px; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-family: inherit; font-size: 0.9rem;
      transition: border-color 0.15s, box-shadow 0.15s; outline: none;
    }
    input::placeholder { color: var(--muted2); }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,108,255,0.12); }

    .submit-btn { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: background 0.15s, transform 0.1s, box-shadow 0.15s; margin-top: 4px; }
    .submit-btn:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,108,255,0.3); }

    .error-msg { font-size: 0.8rem; color: #ef4444; margin-top: 10px; min-height: 18px; text-align: center; }
    .success-msg { font-size: 0.8rem; color: var(--green); margin-top: 10px; text-align: center; }

    .terms-note { margin-top: 18px; font-size: 0.72rem; color: var(--muted2); text-align: center; line-height: 1.6; }
    .terms-note a { color: var(--muted); transition: color 0.15s; }
    .terms-note a:hover { color: var(--text); }

    /* Logged-in state */
    .user-card { display: none; flex-direction: column; align-items: center; gap: 14px; text-align: center; }
    .user-avatar { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--border); object-fit: cover; }
    .user-avatar-initial { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--border); background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 800; color: #fff; }
    .user-name { font-size: 1.15rem; font-weight: 700; }
    .user-email { font-size: 0.85rem; color: var(--muted); margin-top: -8px; }
    .go-btn { padding: 11px 28px; background: var(--accent); color: #fff; border-radius: var(--radius); font-weight: 700; font-size: 0.9rem; transition: background 0.15s; }
    .go-btn:hover { background: var(--accent2); }
    .logout-btn { padding: 9px 24px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius); color: var(--muted); font-family: inherit; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
    .logout-btn:hover { border-color: #555; color: var(--text); }

    /* Footer */
    footer { border-top: 1px solid var(--border2); padding: 24px 0; position: relative; z-index: 1; }
    .footer-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; max-width: 1120px; margin: 0 auto; padding: 0 24px; }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a { font-size: 0.78rem; color: var(--muted2); transition: color 0.15s; }
    .footer-links a:hover { color: var(--muted); }
    .footer-copy { font-size: 0.75rem; color: var(--muted2); }
  </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<header id="site-header">
  <div class="header-inner">
    <a href="/" class="logo">Tabifi</a>
    <div class="header-right">
      <a href="/pricing.html" class="nav-link">Pricing</a>
      <a href="/about.html" class="nav-link">About Us</a>
    </div>
  </div>
</header>

<div class="login-wrap">
  <div class="login-box" id="login-box">
    <div class="login-card">

      <!-- ── Signed-in state ── -->
      <div id="loggedin-state" class="user-card">
        <div id="user-avatar-wrap"></div>
        <div class="user-name" id="user-name"></div>
        <div class="user-email" id="user-email"></div>
        <a href="/" class="go-btn">Go to Tabifi →</a>
        <button class="logout-btn" id="logout-btn">Sign out</button>
      </div>

      <!-- ── Sign-in state ── -->
      <div id="signin-state">
        <div class="login-logo">Tabifi</div>
        <div class="login-title">Welcome back</div>
        <div class="login-sub">Sign in or create your account</div>

        <!-- Google -->
        <div class="google-btn-wrap">
          <div id="g_id_onload"
               data-client_id="1046591584638-qpodimqbck6o73t2f2n1a7m0qj8t9us2.apps.googleusercontent.com"
               data-callback="handleCredentialResponse"
               data-auto_prompt="false">
          </div>
          <div class="g_id_signin"
               data-type="standard"
               data-size="large"
               data-theme="filled_black"
               data-text="continue_with"
               data-shape="rectangular"
               data-logo_alignment="left"
               data-width="340">
          </div>
        </div>

        <div class="divider"><span>or continue with email</span></div>

        <!-- Login / Sign Up tabs -->
        <div class="tab-toggle">
          <button class="tab-btn active" id="tab-login">Login</button>
          <button class="tab-btn" id="tab-signup">Sign Up</button>
        </div>

        <!-- Login form -->
        <div id="login-form">
          <div class="form-group">
            <label for="login-email">Email address</label>
            <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <button class="submit-btn" id="login-btn">Login</button>
          <div class="error-msg" id="login-error"></div>
        </div>

        <!-- Sign Up form -->
        <div id="signup-form" style="display:none;">
          <div class="form-group">
            <label for="signup-name">Full name</label>
            <input type="text" id="signup-name" placeholder="Your name" autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="signup-email">Email address</label>
            <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" placeholder="Min. 8 characters" autocomplete="new-password" />
          </div>
          <button class="submit-btn" id="signup-btn">Create Account</button>
          <div class="error-msg" id="signup-error"></div>
        </div>

        <div class="terms-note">
          By signing in you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </div>
      </div>

    </div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <a href="/" class="logo" style="font-size:1rem;">Tabifi</a>
    <div class="footer-links">
      <a href="/pricing.html">Pricing</a>
      <a href="/about.html">About</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
    </div>
    <div class="footer-copy">© 2025 Tabifi</div>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
// ── Helpers ────────────────────────────────────────────────────────────────
function showUser(user) {
  document.getElementById('signin-state').style.display = 'none';
  const state = document.getElementById('loggedin-state');
  state.style.display = 'flex';

  const avatarWrap = document.getElementById('user-avatar-wrap');
  if (user.picture) {
    avatarWrap.innerHTML = `<img class="user-avatar" src="${user.picture}" alt="${user.name}" />`;
  } else {
    avatarWrap.innerHTML = `<div class="user-avatar-initial">${user.name[0].toUpperCase()}</div>`;
  }
  document.getElementById('user-name').textContent = user.name;
  document.getElementById('user-email').textContent = user.email;
}

// ── Google callback ────────────────────────────────────────────────────────
async function handleCredentialResponse(response) {
  const res = await fetch('/auth/google', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ credential: response.credential }),
  });
  const data = await res.json();
  if (!res.ok) { alert('Google sign-in failed: ' + data.error); return; }
  showUser(data.user);
}

// ── Tab toggle ─────────────────────────────────────────────────────────────
document.getElementById('tab-login').addEventListener('click', function () {
  this.classList.add('active');
  document.getElementById('tab-signup').classList.remove('active');
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('signup-form').style.display = 'none';
});
document.getElementById('tab-signup').addEventListener('click', function () {
  this.classList.add('active');
  document.getElementById('tab-login').classList.remove('active');
  document.getElementById('signup-form').style.display = 'block';
  document.getElementById('login-form').style.display = 'none';
});

// ── Email Login ────────────────────────────────────────────────────────────
document.getElementById('login-btn').addEventListener('click', async function () {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  this.textContent = 'Signing in…';
  this.disabled = true;

  const res = await fetch('/auth/login-email', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  const data = await res.json();
  this.textContent = 'Login';
  this.disabled = false;

  if (!res.ok) { errEl.textContent = data.error; return; }
  showUser(data.user);
});

// ── Email Sign Up ──────────────────────────────────────────────────────────
document.getElementById('signup-btn').addEventListener('click', async function () {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const errEl = document.getElementById('signup-error');
  errEl.textContent = '';
  this.textContent = 'Creating account…';
  this.disabled = true;

  const res = await fetch('/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, email, password }),
  });
  const data = await res.json();
  this.textContent = 'Create Account';
  this.disabled = false;

  if (!res.ok) { errEl.textContent = data.error; return; }
  showUser(data.user);
});

// ── Logout ─────────────────────────────────────────────────────────────────
document.getElementById('logout-btn').addEventListener('click', async function () {
  await fetch('/auth/logout', { method: 'POST' });
  if (window.google) google.accounts.id.disableAutoSelect();
  document.getElementById('loggedin-state').style.display = 'none';
  document.getElementById('signin-state').style.display = 'block';
});

// ── Check existing session ─────────────────────────────────────────────────
fetch('/auth/me')
  .then(r => r.ok ? r.json() : null)
  .then(data => { if (data?.user) showUser(data.user); })
  .catch(() => {});

// ── Animate in ─────────────────────────────────────────────────────────────
gsap.from('#login-box', { opacity: 0, y: 28, duration: 0.65, delay: 0.1, ease: 'power3.out' });
</script>
</body>
</html>
